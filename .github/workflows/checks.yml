name: checks

on:
  push:
    branches:
      - main
    paths-ignore:
      # NOTE: docs/reference/cli.md is auto-generated and ideally should trigger
      # the cli-ref check when manually edited. However, GitHub Actions does not
      # support combining paths-ignore with negation patterns, so we accept the
      # tradeoff: manual edits to that file won't be caught in isolation, but
      # will be caught the next time any Rust source is changed and the checks run.
      - "**.md"
      - "docs-site/**"
      - "npm/**"
  pull_request:
    paths-ignore:
      # See push paths-ignore NOTE above for the tradeoff explanation.
      - "**.md"
      - "docs-site/**"
      - "npm/**"

jobs:
  compile:
    name: compile:required
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Setup image (Linux)
        run: ./.github/scripts/provision-linux-build.sh

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-shared-key: ${{ runner.os }}

      - name: build
        run: cargo build
        env:
          RUST_BACKTRACE: 1

  lint:
    name: lint:required
    needs: compile # Run after compilation to use the cache
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Setup image (Linux)
        run: ./.github/scripts/provision-linux-build.sh

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-shared-key: ${{ runner.os }}

      - name: Run Lint
        run: cargo clippy --verbose --tests --benches -- -D warnings
        env:
          RUST_BACKTRACE: 1

  format:
    name: fmt:required
    needs: compile
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Setup image (Linux)
        run: ./.github/scripts/provision-linux-build.sh

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-shared-key: ${{ runner.os }}

      - name: Check formatting
        run: cargo fmt --all -- --check

  #
  # Runs a series of checks to make sure that all the docs
  # that need to be generated have been genrated an are up
  # to date.
  #

  cli-ref:
    #
    # generate the CLI reference file and check if it is up to date
    #
    name: cli-ref:required
    needs: compile
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Setup image (Linux)
        run: ./.github/scripts/provision-linux-build.sh

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-shared-key: ${{ runner.os }}

      - name: generate docs
        run: ./scripts/generate-cli-docs.sh

      - name: Check for uncommitted changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "❌ The cli-reference documentation is not up to date"
            echo ""
            echo " Run ./scripts/generate-cli-docs.sh to update them"
            echo ""
            git status --porcelain
            exit 1
          else
            echo "✅ Git state is clean."
          fi

  icp-yaml-schema:
    #
    # generate config schemas and check if they are up to date
    #
    name: icp-yaml-schema:required
    needs: compile
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Setup image (Linux)
        run: ./.github/scripts/provision-linux-build.sh

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-shared-key: ${{ runner.os }}

      - name: generate schemas
        run: ./scripts/generate-config-schemas.sh

      - name: Check for uncommitted changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "❌ The schema docs are not up to date"
            echo ""
            echo " Run ./scripts/generate-config-schemas.sh to update them"
            echo ""
            git status --porcelain
            exit 1
          else
            echo "✅ Git state is clean."
          fi
