name: Validate Examples

on:
  push:
    branches:
      - main
    paths-ignore:
      # NOTE: all docs/ markdown files are covered by "**.md" above. The only
      # docs/ files that still trigger this workflow are docs/schemas/*.json —
      # intentionally, since this workflow validates project manifests against
      # those schemas.
      - "**.md"
      - "docs-site/**"
      - "npm/**"
  pull_request:
    paths-ignore:
      # See push paths-ignore NOTE above.
      - "**.md"
      - "docs-site/**"
      - "npm/**"

env:
  # When getting Rust dependencies, retry on network error:
  CARGO_NET_RETRY: 10
  # Use the local .curlrc
  CURL_HOME: .

jobs:
  validate-examples:
    name: Validate Examples on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]

    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0

      - name: Setup image (Linux)
        if: ${{ contains(matrix.os, 'ubuntu') }}
        run: ./.github/scripts/provision-linux-build.sh

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache-shared-key: ${{ runner.os }}

      - name: Build icp CLI
        run: cargo build

      - name: Validate examples
        run: ./scripts/validate-examples.sh

  aggregate:
    name: validate-examples:required
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: [validate-examples]
    steps:
      - name: check result
        if: ${{ needs.validate-examples.result != 'success' }}
        run: exit 1
