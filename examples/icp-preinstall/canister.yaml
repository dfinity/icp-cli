name: preinstall-demo

build:
  steps:
    - type: script
      commands:
        - echo "fn main() {}" > main.rs
        - rustc --target wasm32-unknown-unknown main.rs -o "$ICP_WASM_OUTPUT_PATH"

preinstall:
  steps:
    - type: script
      command: ./scripts/validate-wasm.sh

sync:
  steps:
    - type: script
      command: echo "Deployed to $ICP_CANISTER_ID"
