# yaml-language-server: $schema=https://github.com/dfinity/icp-cli/raw/refs/tags/v0.1.0/docs/schemas/icp-yaml-schema.json
#
# Shared-dependency ("umbrella") example.
#
# `umbrella/` bundles three sibling projects — `service-a`, `service-b`, and
# `openemail` — as it would appear when vendored as a git submodule. Both
# `service-a` and `service-b` depend on `openemail` via `../openemail`.
#
# This app depends on both services. Because both service edges resolve to the
# SAME `umbrella/openemail` directory, openemail is deployed exactly once and
# shared: `service-a`'s and `service-b`'s canisters both discover the one
# openemail instance through `PUBLIC_CANISTER_ID:openemail:backend`.

canisters:
  - name: frontend
    build:
      steps:
        - type: pre-built
          path: ../icp-pre-built/dist/hello_world.wasm
          sha256: 17a05e36278cd04c7ae6d3d3226c136267b9df7525a0657521405e22ec96be7a

dependencies:
  - name: service-a
    path: ./umbrella/service-a
    canisters: [service]
  - name: service-b
    path: ./umbrella/service-b
    canisters: [service]
