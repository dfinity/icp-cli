canisters:
  - name: my-canister
    build:
      steps:
        - type: script
          commands:
            - cargo build --target wasm32-unknown-unknown --release --locked -p canister
            - mv target/wasm32-unknown-unknown/release/canister.wasm "$ICP_WASM_OUTPUT_PATH"

        - type: script
          commands:
            - command -v ic-wasm >/dev/null 2>&1 || { echo >&2 "ic-wasm not found. To install ic-wasm, see https://github.com/dfinity/ic-wasm\n"; exit 1; }
            - ic-wasm "$ICP_WASM_OUTPUT_PATH" -o "$ICP_WASM_OUTPUT_PATH" metadata candid:service -f demo.did --keep-name-section

    sync:
      steps:
        - type: plugin
          # Path to the compiled PoC plugin wasm, relative to this directory.
          # Build it first: cd plugin && cargo build --target wasm32-wasip2 --release
          path: plugin/target/wasm32-wasip2/release/icp_sync_plugin_poc.wasm
          dirs:
            - seed-data
          files:
            - config.txt
